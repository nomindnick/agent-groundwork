name: long_context
description: Asks the model to read a long markdown file. First call should be read_file.
prompt: "Read longdoc.md and summarize section 3 in two sentences."
seed_files:
  longdoc.md: |
    # Long Document

    ## Section 1
    Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod
    tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim
    veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea
    commodo consequat.

    ## Section 2
    Duis aute irure dolor in reprehenderit in voluptate velit esse cillum
    dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non
    proident, sunt in culpa qui officia deserunt mollit anim id est laborum.

    ## Section 3
    The quarterly review covers three priorities: hiring two senior engineers,
    shipping the new billing pipeline by end of June, and reducing on-call
    pages by 30%. Owners are assigned in the appendix.

    ## Section 4
    Appendix omitted for brevity.
available_tools: [list_files, read_file, search_files]
seed_messages: []
rubric:
  expected_tool_called: read_file
  arg_contains:
    path: longdoc.md
